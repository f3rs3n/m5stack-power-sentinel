[env:m5stack-cores3]
platform = espressif32
board = m5stack-cores3
framework = arduino
monitor_speed = 115200

lib_deps =
  m5stack/M5Unified@0.1.14
  m5stack/M5GFX@0.1.16
  lvgl/lvgl@9.0.0
  bblanchon/ArduinoJson@^7.0.4

build_flags =
  -DLV_CONF_PATH="${platformio.include_dir}/lv_conf.h"
  -I include
  -I .pio/libdeps/m5stack-cores3/lvgl

; First flash: use VS Code + PlatformIO on the machine with the CoreS3 attached.
; Do not commit upload_port; keep it local if needed.
; upload_speed = 1500000
