[env:m5stack-cores3]
platform = espressif32
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
upload_port = COM4
monitor_port = COM4

lib_deps =
  m5stack/M5Unified
  lvgl/lvgl@^9.0.0
  bblanchon/ArduinoJson@^7.0.4
  m5stack/M5CoreS3@^1.0.1

build_flags =
  -DLV_CONF_INCLUDE_SIMPLE
  -I include
build_src_filter =
  +<*>
  -<als_probe.cpp>

[env:m5stack-cores3-ledcards-interface]
extends = env:m5stack-cores3
build_flags =
  ${env:m5stack-cores3.build_flags}
  -DPOWER_SENTINEL_LEDCARDS_INTERFACE_ONLY=1

[env:m5stack-cores3-als-probe]
extends = env:m5stack-cores3
lib_deps =
  m5stack/M5Unified
  m5stack/M5CoreS3@^1.0.1
build_flags =
  ${env:m5stack-cores3.build_flags}
  -DPOWER_SENTINEL_ALS_PROBE_INTERVAL_MS=250UL
build_src_filter =
  +<als_probe.cpp>

; First flash: use VS Code + PlatformIO on the machine with the CoreS3 attached.
; COM4 is the current Windows/CoreS3 default for this project; change locally if Windows assigns a different port.
; Use `pio run -e m5stack-cores3-ledcards-interface -t upload` for the static Ledcards Interface visual-test firmware.
; Use `pio run -e m5stack-cores3-als-probe -t upload` for the development-only LTR553 ALS calibration probe.
; upload_speed = 1500000
