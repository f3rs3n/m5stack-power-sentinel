[env:m5stack-cores3]
platform = espressif32
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
upload_port = COM4
monitor_port = COM4

lib_deps =
  m5stack/M5Unified
  lvgl/lvgl@^9.0.0
  bblanchon/ArduinoJson@^7.0.4

build_flags =
  -DLV_CONF_INCLUDE_SIMPLE
  -I include

; First flash: use VS Code + PlatformIO on the machine with the CoreS3 attached.
; COM4 is the current Windows/CoreS3 default for this project; change locally if Windows assigns a different port.
; upload_speed = 1500000
