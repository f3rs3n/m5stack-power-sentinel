[env:m5stack-cores3]
platform = espressif32
board = m5stack-cores3
framework = arduino
monitor_speed = 115200

lib_deps =
  m5stack/M5Unified
  lvgl/lvgl@^9.0.0
  bblanchon/ArduinoJson@^7.0.4

build_flags =
  -DLV_CONF_INCLUDE_SIMPLE
  -I include

; First flash: use VS Code + PlatformIO on the machine with the CoreS3 attached.
; Do not commit upload_port; keep it local if needed.
; upload_speed = 1500000
